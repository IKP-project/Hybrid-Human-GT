              function drawGraph() {

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"borderWidth": 2, "color": {"background": "#45475a", "border": "#f38ba8", "highlight": {"background": "#585b70", "border": "#fab387"}}, "font": {"color": "#cdd6f4"}, "id": 1, "label": "Interview about dental practices", "shape": "star", "size": 40, "title": "\u003cb\u003etype:\u003c/b\u003e root\u003cbr\u003e\u003cb\u003ename:\u003c/b\u003e R\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 1\u003cbr\u003e\u003cbr\u003eInterview about dental practices"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 2, "label": "In these dental practices the adaptation to preventive\nprotocols was all about believing in this new approach\nto manage dental caries and in themselves...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 2\u003cbr\u003e\u003cbr\u003eIn these dental practices the adaptation to preventive protocols was all about believing in this new approach to manage dental caries and in themselves as professionals."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 3, "label": "New concepts were embraced and slowly incorporated into\npractice. Embracing new concepts/paradigms/systems and\nabandoning old ones was quite evident during t...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 3\u003cbr\u003e\u003cbr\u003eNew concepts were embraced and slowly incorporated into practice. Embracing new concepts/paradigms/systems and abandoning old ones was quite evident during this process (old concepts = dentistry restorative model; new concepts = non-surgical approach)."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 4, "label": "This evolving process involved feelings such as\nanxiety, doubt, determination, confidence, and\nreassurance. The modification of practices was possi...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 4\u003cbr\u003e\u003cbr\u003eThis evolving process involved feelings such as anxiety, doubt, determination, confidence, and reassurance. The modification of practices was possible when dentists-in-charge felt that perhaps there was something else that would be worth doing; something that might be a little different from what was done so far."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 5, "label": "The responsibility to offer the best available\ntreatment might have triggered this reasoning. However,\nthere are other factors that play an important r...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 5\u003cbr\u003e\u003cbr\u003eThe responsibility to offer the best available treatment might have triggered this reasoning. However, there are other factors that play an important role during this process such as dentist\u2019s personal features, preconceived notions, dental practice environment, and how dentists combine patients\u2019 needs and expectations while making treatment decisions."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 6, "label": "Finding the balance between preventive non-surgical\ntreatment (curing of disease) and restorative treatment\n(making up for lost tissues) is an every mom...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 6\u003cbr\u003e\u003cbr\u003eFinding the balance between preventive non-surgical treatment (curing of disease) and restorative treatment (making up for lost tissues) is an every moment challenge in a profitable dental practice."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 7, "label": "Regaining profit, reassessing team work and surgery\nlogistics, and mastering the scheduling art to maximize\nfinancial and clinical outcomes were import...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 7\u003cbr\u003e\u003cbr\u003eRegaining profit, reassessing team work and surgery logistics, and mastering the scheduling art to maximize financial and clinical outcomes were important practical issues tackled in some of these practices during this process."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 8, "label": "These participants talked about learning and adapting\nnew concepts to their practices and finally never going\nback the way it was before.", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 8\u003cbr\u003e\u003cbr\u003eThese participants talked about learning and adapting new concepts to their practices and finally never going back the way it was before. "}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 9, "label": "This process brought positive changes to participants\u2019\ndaily activities. Empowerment of practice staff made\nthem start to enjoy more their daily work (they w...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 9\u003cbr\u003e\u003cbr\u003eThis process brought positive changes to participants\u2019 daily activities. Empowerment of practice staff made them start to enjoy more their daily work (they were recognized by patients as someone who was truly interested in delivering the best treatment for them)."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 10, "label": "Team members realized that there were many benefits to\npatients and to staff members in implementing this\nprogram, such as, professional development, offer...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 10\u003cbr\u003e\u003cbr\u003eTeam members realized that there were many benefits to patients and to staff members in implementing this program, such as, professional development, offering the best care for each patient and job satisfaction."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 11, "label": "Q. What did you take into account when you decided to\nbuy this new technology?", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 11\u003cbr\u003e\u003cbr\u003eQ. What did you take into account when you decided to buy this new technology?"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 12, "label": "A: What did we... we looked at cost, we looked at\nreliability and we sort of, we compared a few different\ntypes, talked to some people that had them.", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 12\u003cbr\u003e\u003cbr\u003eA: What did we... we looked at cost, we looked at reliability and we sort of, we compared a few different types, talked to some people that had them."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 13, "label": "Q. When you say you talked to some people who were\nthey?", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 13\u003cbr\u003e\u003cbr\u003eQ. When you say you talked to some people who were they?"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 14, "label": "A: Some dental colleagues. There\u2019s a couple of internet\nsites that we talked to some people... people had tried\nout some that didn\u2019t work very well.", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 14\u003cbr\u003e\u003cbr\u003eA: Some dental colleagues. There\u2019s a couple of internet sites that we talked to some people... people had tried out some that didn\u2019t work very well."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 15, "label": "Q. So in terms of materials either preventive materials\nor restorative materials; what do you take in account\nwhen you decide which one to adopt?", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 15\u003cbr\u003e\u003cbr\u003eQ. So in terms of materials either preventive materials or restorative materials; what do you take in account when you decide which one to adopt?"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#89b4fa", "highlight": {"background": "#45475a", "border": "#cba6f7"}}, "font": {"color": "#cdd6f4"}, "id": 16, "label": "A: Well, that\u2019s a good question. I don\u2019t know. I\nsuppose we [laughs] look at reliability. I suppose I\u2019ve\nbeen looking at literature involved in it so I qu...", "shape": "dot", "size": 18, "title": "\u003cb\u003etype:\u003c/b\u003e raw\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 16\u003cbr\u003e\u003cbr\u003eA: Well, that\u2019s a good question. I don\u2019t know. I suppose we [laughs] look at reliability. I suppose I\u2019ve been looking at literature involved in it so I quite like my own little research about that, because I don\u2019t really trust the research that comes with the product and once again what other dentists are using and what they\u2019ve been using and they\u2019re happy with. I\u2019m finding the internet, some of those internet forums are actually quite good for new products."}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#a6e3a1", "highlight": {"background": "#45475a", "border": "#fab387"}}, "font": {"color": "#cdd6f4"}, "id": 17, "label": "belief in new approach", "shape": "diamond", "size": 22, "title": "\u003cb\u003etype:\u003c/b\u003e code\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 17\u003cbr\u003e\u003cbr\u003ebelief in new approach"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#a6e3a1", "highlight": {"background": "#45475a", "border": "#fab387"}}, "font": {"color": "#cdd6f4"}, "id": 18, "label": "self-efficacy of professionals", "shape": "diamond", "size": 22, "title": "\u003cb\u003etype:\u003c/b\u003e code\u003cbr\u003e\u003cb\u003eid:\u003c/b\u003e 18\u003cbr\u003e\u003cbr\u003eself-efficacy of professionals"}, {"borderWidth": 2, "color": {"background": "#313244", "border": "#a6e3a1", "highlight": {"background": "#45475a", "border": "#fab387"}}, "font": {"color": "#cdd6f4"}, "id": 19,
